# ============================================================
# Addies's Gruvbox-Teal Kitty rice
# ============================================================

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        9.0

# Cursor
cursor                 #b8bb26
cursor_text_color      #282828
cursor_shape           beam
cursor_beam_thickness  1.5
cursor_blink_interval  0.5

# Window
window_padding_width 10
background_opacity 0.55
dynamic_background_opacity yes

# Powerline-style tab bar
tab_bar_edge          top
tab_bar_style         powerline
tab_powerline_style   slanted
tab_bar_min_tabs      1
tab_bar_align         left
tab_bar_background    #1d2021

active_tab_foreground   #282828
active_tab_background   #b8bb26
active_tab_font_style   bold

inactive_tab_foreground #ebdbb2
inactive_tab_background #3c3836
inactive_tab_font_style normal

tab_title_template " {index}: {title} "

# General behavior
scrollback_lines        20000
enable_audio_bell       no
confirm_os_window_close 0
mouse_hide_wait         2
url_color               #8ec07c
url_style               curly
underline_hyperlinks    always

# Adjust transparency while Kitty is running
map ctrl+alt+equal set_background_opacity +0.02
map ctrl+alt+minus set_background_opacity -0.02
map ctrl+alt+0 set_background_opacity default

# Gruvbox dark
foreground            #ebdbb2
background            #282828
selection_foreground  #282828
selection_background  #b8bb26

# Normal colors
color0  #282828
color1  #cc241d
color2  #98971a
color3  #d79921
color4  #458588
color5  #b16286
color6  #689d6a
color7  #a89984

# Bright colors
color8  #928374
color9  #fb4934
color10 #b8bb26
color11 #fabd2f
color12 #83a598
color13 #d3869b
color14 #8ec07c
color15 #ebdbb2

# Modern mouse copy/paste

# Do not copy merely by highlighting
copy_on_select clipboard

# Right-click copies selected text
mouse_map right press ungrabbed copy_to_clipboard

# Right-click pastes when there is no selection
mouse_map right press ungrabbed paste_from_clipboard